<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>molwatch &mdash; live trajectory viewer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.1.0/3Dmol-min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
<header>
  <h1>
    molwatch
    <span class="tag">live trajectory viewer &mdash; SIESTA &middot; PySCF / geomeTRIC</span>
  </h1>
  <div class="loader">
    <label for="path-input">Output file:</label>
    <input id="path-input" type="text"
           placeholder="/abs/path/to/job.molwatch.log  or  /abs/path/to/run.out"
           size="60" autofocus
           title="Type an absolute path for live polling, or leave empty
and click Load to pick a file (one-shot view, no live updates).

Preferred for molbuilder-generated runs:
  <job>.molwatch.log  -- single-file unified log; for PySCF runs
                         it streams every opt step, for SIESTA runs
                         it carries an initial-geometry preview.

Engine-native files (also supported):
  run.out  /  siesta.log         -- SIESTA's main output
  <job>_geom_optim.xyz           -- geomeTRIC's streaming trajectory">
    <!-- Hidden file picker; shown only when Load is clicked with an
         empty path-input.  Picker-selected files are uploaded as
         multipart and parsed once (no polling, since the browser
         doesn't expose the file's filesystem path). -->
    <input id="file-picker" type="file" hidden
           accept=".out,.log,.xyz,.ANI,text/plain,chemical/x-xyz">
    <button id="load-btn">Load</button>
    <span id="status" class="status">No file loaded.</span>
  </div>
</header>

<main>
  <section class="viewer-row">
    <div id="viewer"></div>

    <aside class="controls">
      <fieldset>
        <legend>Style</legend>

        <label>Representation
          <select id="rep">
            <option value="stick" selected>stick</option>
            <option value="ballstick">ball &amp; stick</option>
            <option value="sphere">sphere (CPK)</option>
            <option value="line">line</option>
          </select>
        </label>

        <label>Atom radius scale
          <input id="radius" type="range" min="0.2" max="2.5" step="0.05" value="1.0">
        </label>

        <label>Color scheme
          <select id="colorscheme">
            <option value="Jmol" selected>Jmol (CPK)</option>
            <option value="rasmol">Rasmol</option>
            <option value="default">3Dmol default</option>
          </select>
        </label>

        <label>Background
          <select id="bg">
            <option value="white" selected>white</option>
            <option value="0xeeeeee">light grey</option>
            <option value="black">black</option>
          </select>
        </label>

        <label><input type="checkbox" id="show-cell" checked> Show unit cell</label>
      </fieldset>

      <fieldset>
        <legend>Overlays</legend>
        <label><input type="checkbox" id="show-indices"> Show atom indices</label>
        <label><input type="checkbox" id="show-forces"> Show force vectors</label>
        <label>Arrow length scale (&Aring; per eV/&Aring;)
          <input id="force-scale" type="range" min="0.1" max="5.0" step="0.1" value="1.0">
          <span id="force-scale-val">1.0</span>
        </label>
        <label>Hide |F| smaller than (eV/&Aring;)
          <input id="force-min" type="number" min="0" max="10" step="0.05" value="0.05">
        </label>
        <label><input type="checkbox" id="highlight-max" checked> Highlight largest force</label>
      </fieldset>

      <fieldset>
        <legend>Playback</legend>
        <div class="row">
          <button id="play">&#9654; Play</button>
          <button id="pause">&#9208; Pause</button>
          <button id="prev">&lsaquo;</button>
          <button id="next">&rsaquo;</button>
        </div>
        <label>Frame <span id="frame-idx">0</span> / <span id="frame-tot">0</span>
          <input id="frame-slider" type="range" min="0" max="0" value="0" step="1">
        </label>
        <label>Speed (ms / frame)
          <input id="speed" type="number" min="20" max="3000" step="20" value="150">
        </label>
        <label><input type="checkbox" id="loop" checked> Loop</label>
      </fieldset>
    </aside>
  </section>

  <section class="plots-row">
    <div id="energy-plot" class="plot"></div>
    <div id="force-plot" class="plot"></div>
  </section>

  <!-- PySCF-only section: SCF-iteration progress for the most recent
       geom-opt step.  Hidden when the loaded file has no scf_history
       (e.g. SIESTA, or the PySCF .log isn't sitting next to the
       trajectory). -->
  <section class="scf-row" id="scf-section" hidden>
    <div class="scf-banner">
      <strong>PySCF SCF progress</strong>
      <span id="scf-status" class="scf-status"></span>
    </div>
    <div class="scf-plots">
      <div id="scf-energy-plot" class="plot"></div>
      <div id="scf-gnorm-plot"  class="plot"></div>
    </div>
  </section>
</main>

<script src="{{ url_for('static', filename='viewer.js') }}"></script>
</body>
</html>
